    <!-- Tailwind Config for F1 x Dirt Theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['Teko', 'sans-serif'], // Aggressive racing font
                        body: ['Rajdhani', 'sans-serif'], // Technical, telemetry style
                    },
                    colors: {
                        dirt: {
                            orange: '#ea580c', // Bright dirt/mud orange
                            dark: '#9a3412',
                            mud: '#431407'
                        },
                        f1: {
                            red: '#e10600', // Official F1 Red
                            dark: '#990000',
                        },
                        carbon: {
                            dark: '#0a0a0a',
                            base: '#141414',
                            light: '#1f1f1f',
                            border: '#333333'
                        }
                    },
                    animation: {
                        'slide-in': 'slideIn 0.4s ease-out forwards',
                        'rev': 'revEngine 0.1s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        slideIn: {
                            '0%': { opacity: '0', transform: 'translateX(20px) skewX(-2deg)' },
                            '100%': { opacity: '1', transform: 'translateX(0) skewX(0)' },
                        },
                        revEngine: {
                            '0%': { transform: 'translateY(0px)' },
                            '100%': { transform: 'translateY(-2px)' },
                        }
                    }
                }
            }
        }

    <style>
        body {
            background-color: #0a0a0a;
            /* Asphalt / Carbon Fiber Pattern */
            background-image: 
                linear-gradient(45deg, #0f0f0f 25%, transparent 25%, transparent 75%, #0f0f0f 75%, #0f0f0f),
                linear-gradient(45deg, #0f0f0f 25%, transparent 25%, transparent 75%, #0f0f0f 75%, #0f0f0f);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #d1d5db;
        }

        /* Racing Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; border-left: 1px solid #333; }
        ::-webkit-scrollbar-thumb { background: #e10600; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }

        /* F1 Aero Cuts (Slanted UI Elements) */
        .aero-cut {
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }
        .aero-cut-btn {
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        .aero-slant {
            transform: skewX(-10deg);
        }
        .aero-slant-reverse {
            transform: skewX(10deg);
        }

        /* Nav Link States */
        .nav-link {
            transition: all 0.3s ease;
            position: relative;
            border-left: 3px solid transparent;
        }
        .nav-link:hover {
            border-left: 3px solid #ea580c;
            background-color: #1f1f1f;
        }
        .nav-link.active {
            background: linear-gradient(90deg, rgba(225, 6, 0, 0.15) 0%, transparent 100%);
            border-left: 4px solid #e10600;
            color: #ffffff;
        }
        .nav-link.active i { color: #ea580c; }

        /* Table Styling - Telemetry Look */
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; margin-top: 1rem; margin-bottom: 1rem; }
        th { background-color: #141414; color: #ea580c; font-family: 'Teko', sans-serif; text-transform: uppercase; font-size: 1.2rem; padding: 0.75rem 1rem; text-align: left; letter-spacing: 1px; border-bottom: 2px solid #e10600; }
        td { padding: 1rem; background-color: #1a1a1a; border-top: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a; color: #e2e8f0; }
        tr td:first-child { border-left: 3px solid #333; }
        tr td:last-child { border-right: 1px solid #2a2a2a; }
        tr:hover td { background-color: rgba(234, 88, 12, 0.05); border-left-color: #ea580c; }

        .list-icon::before {
            content: '\f105'; /* fa-angle-right */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #e10600;
            margin-right: 12px;
        }
    </style>
</head>

                                <strong class="text-f1-red uppercase block mb-3 font-heading text-2xl tracking-widest">Severity Matrix:</strong>

                `

                content: `

                            </ul>
                        </div>

                        <div class="bg-carbon-light border-t-2 border-dirt-orange p-6 aero-cut shadow-md">
                            <h3 class="text-3xl font-heading text-white uppercase mb-3 tracking-widest"><i class="fa-solid fa-mug-hot text-dirt-orange mr-2"></i> Hospitality: GM & EBT</h3>
                            <ul class="list-disc list-inside text-gray-300 space-y-2 font-medium">
                                <li><strong class="text-white">Inventory:</strong> "Stock-Out" = failure of service.</li>
                                <li><strong class="text-white">Stamina:</strong> Specialized buff menus.</li>
                                <li><strong class="text-white">Public:</strong> Manage spectator concessions.</li>
                            </ul>
                        </div>

                        <div class="bg-carbon-light border-t-2 border-f1-red p-6 aero-cut shadow-md">
                            <h3 class="text-3xl font-heading text-white uppercase mb-3 tracking-widest"><i class="fa-solid fa-video text-f1-red mr-2"></i> Media: X-NEWS</h3>
                            <ul class="list-disc list-inside text-gray-300 space-y-2 font-medium">

                                <li><strong class="text-white">Post-Race:</strong> Podium interviews & Recap.</li>

                    </div>
                `
            },
            {
                id: 11,
                icon: "fa-solid fa-trophy",
                title: "11. Standings",
                content: `
                    <div class="border-l-8 border-f1-red pl-4 bg-gradient-to-r from-f1-red/20 to-transparent py-2 mb-8 aero-cut-btn">
                        <h2 class="text-5xl font-heading text-white uppercase m-0 leading-none">Section 11: Standings</h2>
                    </div>
                    
                    <div class="bg-gradient-to-r from-dirt-orange/20 to-transparent p-5 aero-cut border-l-4 border-dirt-orange mb-8">
                        <p class="text-2xl font-heading text-white tracking-widest uppercase m-0">The "Perfect 100"</p>
                        <p class="text-gray-300 font-medium">Max points per weekend for flawless departmental performance.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">

                                <li class="flex justify-between border-b border-carbon-border pb-2"><span class="text-[#9ca3af]"><i class="fa-solid fa-medal mr-2"></i> 2nd Place</span> <span class="text-white bg-carbon-base px-3 py-1 rounded-sm shadow-inner">+35 Pts</span></li>
                                <li class="flex justify-between border-b border-carbon-border pb-2"><span class="text-[#b45309]"><i class="fa-solid fa-medal mr-2"></i> 3rd Place</span> <span class="text-white bg-carbon-base px-3 py-1 rounded-sm shadow-inner">+25 Pts</span></li>
                                <li class="flex justify-between"><span class="text-gray-500">Top 10</span> <span class="text-white bg-carbon-base px-3 py-1 rounded-sm shadow-inner">+10 Pts</span></li>
                            </ul>
                        </div>

                        <!-- Bonuses -->
                        <div class="bg-carbon-light p-6 border border-carbon-border aero-cut shadow-lg">
                            <h3 class="text-3xl font-heading text-dirt-orange mb-5 uppercase tracking-widest border-b border-carbon-border pb-2">11.2/3 Bonus Multipliers</h3>
                            <ul class="space-y-4 font-bold text-gray-300">
                                <li class="flex justify-between items-center"><span class="uppercase flex items-center"><i class="fa-solid fa-gauge-high mr-2 text-dirt-orange"></i> Fastest Lap</span> <span class="text-white font-heading text-xl bg-dirt-orange px-2 py-1">+10</span></li>
                                <li class="flex justify-between items-center"><span class="uppercase flex items-center"><i class="fa-solid fa-wrench mr-2 text-dirt-orange"></i> Tech Perfect (0 Pits/Dmg)</span> <span class="text-white font-heading text-xl bg-dirt-orange px-2 py-1">+15</span></li>
                                <li class="flex justify-between items-center"><span class="uppercase flex items-center"><i class="fa-solid fa-car-side mr-2 text-dirt-orange"></i> Clean Drive (0 Contact)</span> <span class="text-white font-heading text-xl bg-dirt-orange px-2 py-1">+10</span></li>
                                <li class="flex justify-between items-center"><span class="uppercase flex items-center"><i class="fa-solid fa-file-circle-check mr-2 text-gray-400"></i> Flawless Reporting</span> <span class="text-white font-heading text-xl bg-gray-600 px-2 py-1">+10</span></li>
                                <li class="flex justify-between items-center"><span class="uppercase flex items-center"><i class="fa-solid fa-handshake mr-2 text-gray-400"></i> Partner Synergy</span> <span class="text-white font-heading text-xl bg-gray-600 px-2 py-1">+5</span></li>
                            </ul>
                        </div>
                    </div>

                    <div class="bg-[#110000] border-l-4 border-f1-red p-5 aero-cut shadow-md">
                        <h3 class="text-2xl font-heading text-f1-red mb-2 uppercase tracking-widest"><i class="fa-solid fa-triangle-exclamation mr-2"></i> 11.4 Penalties</h3>
                        <p class="text-gray-300 text-lg">Deductions scale directly against the Total Points accumulated during the race weekend, based on RMO flags, time-outs, and 2nd car deployments.</p>
                    </div>
                `
            }
        ];

        let activeSectionId = 1;

        const navContainer = document.getElementById('nav-container');
        const contentContainer = document.getElementById('content-container');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');

        // Toggle mobile menu
        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
        });

        function renderNav() {
            navContainer.innerHTML = rulesData.map(section => `
                <button 
                    onclick="switchSection(${section.id})" 
                    class="nav-link w-full text-left px-4 py-3 mb-1 aero-cut-btn text-base font-heading tracking-widest text-gray-400 flex items-center ${activeSectionId === section.id ? 'active' : ''}"
                >
                    <i class="${section.icon} w-6 text-center mr-3 text-xl transition-colors"></i> 
                    <span class="uppercase truncate mt-1 text-xl">${section.title}</span>
                </button>
            `).join('');
        }

        function renderContent() {
            const section = rulesData.find(s => s.id === activeSectionId);
            if (section) {
                // Apply slide animation
                contentContainer.classList.remove('animate-slide-in');
                void contentContainer.offsetWidth; // Reflow
                contentContainer.innerHTML = section.content;
                contentContainer.classList.add('animate-slide-in');
            }
        }

        function switchSection(id) {
            if(activeSectionId === id) return;
            activeSectionId = id;
            
            // Add a quick engine rev animation to the whole section
            const mainSection = document.querySelector('section');
            mainSection.classList.add('animate-rev');
            setTimeout(() => mainSection.classList.remove('animate-rev'), 150);

            renderNav();
            renderContent();
            
            // On mobile, hide menu after selection
            if(window.innerWidth < 768) {
                sidebar.classList.add('hidden');
            }
            
            // Smooth scroll to top of content area on mobile
            if(window.innerWidth < 768) {
               document.querySelector('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Initialize
        renderNav();
        renderContent();

    </script>
</body>
</html>
