        let activeSectionId = 1;

        const navContainer = document.getElementById('nav-container');
        const contentContainer = document.getElementById('content-container');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');

        // Toggle mobile menu
        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
        });

        function renderNav() {
            navContainer.innerHTML = rulesData.map(section => `
                <button 
                    onclick="switchSection(${section.id})" 
                    class="nav-link w-full text-left px-4 py-3 rounded-lg text-sm md:text-base font-semibold text-gray-400 hover:bg-tech-800 hover:text-white transition-all flex items-center ${activeSectionId === section.id ? 'active' : ''}"
                >
                    <i class="${section.icon} w-6 text-center mr-2"></i> 
                    <span class="truncate">${section.title}</span>
                </button>
            `).join('');
        }

        function renderContent() {
            const section = rulesData.find(s => s.id === activeSectionId);
            if (section) {
                // Remove animation class briefly to re-trigger it
                contentContainer.classList.remove('fade-in');
                void contentContainer.offsetWidth; // trigger reflow
                contentContainer.innerHTML = section.content;
                contentContainer.classList.add('fade-in');
            }
        }

        function switchSection(id) {
            activeSectionId = id;
            renderNav();
            renderContent();
            
            // On mobile, hide menu after selection
            if(window.innerWidth < 768) {
                sidebar.classList.add('hidden');
            }
            
            // Smooth scroll to top of content area on mobile
            if(window.innerWidth < 768) {
               document.querySelector('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Initialize
        renderNav();
        renderContent();

    </script>
